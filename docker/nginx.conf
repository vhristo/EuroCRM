worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length    1000;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Max upload size (for future file attachments)
        client_max_body_size 10M;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"               always;
        add_header X-Content-Type-Options    "nosniff"                  always;
        add_header X-XSS-Protection          "1; mode=block"            always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';"
            always;

        # Hide nginx version
        server_tokens off;

        # ── Next.js static assets — long cache ────────────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Next.js image optimisation endpoint ───────────────────────────────
        location /_next/image {
            proxy_pass http://nextjs;
        }

        # ── All other requests — proxy to Next.js ─────────────────────────────
        location / {
            proxy_pass       http://nextjs;
            proxy_http_version 1.1;

            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;

            # Disable buffering for SSE / streaming responses
            proxy_buffering off;
        }

        # ── Health check endpoint (used by Docker / load balancers) ───────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
