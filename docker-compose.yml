version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: eurocrm-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/eurocrm?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-EuroCRM}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - eurocrm-network

  mongo:
    image: mongo:7
    container_name: eurocrm-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme}
      MONGO_INITDB_DATABASE: eurocrm
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - eurocrm-network

  nginx:
    build:
      context: ./docker
      dockerfile_inline: |
        FROM nginx:1.25-alpine
        COPY nginx.conf /etc/nginx/nginx.conf
    container_name: eurocrm-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - app
    networks:
      - eurocrm-network

networks:
  eurocrm-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
